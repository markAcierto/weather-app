 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Weather</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        #weather-info {
            margin-top: 20px;
        }
        .weather-item {
            margin: 10px 0;
            font-size: 18px;
        }
        .temperature {
            font-size: 36px;
            font-weight: bold;
            color: #ff6b35;
        }
        .description {
            text-transform: capitalize;
            margin: 10px 0;
        }
        .error {
            color: red;
            margin-top: 20px;
        }
        .loading {
            color: #666;
            font-style: italic;
        }
        #location {
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Weather</h1>
        <div id="location">Detecting location...</div>
        <div class="loading">Loading weather data...</div>
        <div id="weather-info">
            <div class="temperature" id="temperature">--°C</div>
            <div class="description" id="description">--</div>
            <div class="weather-item">Humidity: <span id="humidity">--%</span></div>
            <div class="weather-item">Wind Speed: <span id="wind-speed">-- m/s</span></div>
        </div>
        <div id="error-message" class="error"></div>
    </div>

    <script>
        const API_KEY = '62b975314b57020b17b6dad18f91427e'; // Replace with your OpenWeatherMap API key
        const locationDiv = document.getElementById('location');
        const loadingDiv = document.querySelector('.loading');
        const weatherInfoDiv = document.getElementById('weather-info');
        const errorDiv = document.getElementById('error-message');
        const temperatureDiv = document.getElementById('temperature');
        const descriptionDiv = document.getElementById('description');
        const humidityDiv = document.getElementById('humidity');
        const windSpeedDiv = document.getElementById('wind-speed');

        // Get user's location using Geolocation API
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        locationDiv.textContent = `Location: Latitude ${lat.toFixed(4)}, Longitude ${lon.toFixed(4)}`;
                        fetchWeather(lat, lon);
                    },
                    error => {
                        errorDiv.textContent = `Error getting location: ${error.message}`;
                        loadingDiv.style.display = 'none';
                    }
                );
            } else {
                errorDiv.textContent = "Geolocation is not supported by this browser.";
                loadingDiv.style.display = 'none';
            }
        }

        // Fetch weather data from OpenWeatherMap API
        async function fetchWeather(lat, lon) {
            try {
                const apiUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`Weather API error: ${response.status}`);
                }

                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                errorDiv.textContent = `Error fetching weather: ${error.message}`;
                loadingDiv.style.display = 'none';
            }
        }

        // Display weather data
        function displayWeather(data) {
            loadingDiv.style.display = 'none';
            weatherInfoDiv.style.display = 'block';

            temperatureDiv.textContent = `${Math.round(data.main.temp)}°C`;
            descriptionDiv.textContent = data.weather[0].description;
            humidityDiv.textContent = data.main.humidity;
            windSpeedDiv.textContent = data.wind.speed;

            // Update location with city name if available
            if (data.name) {
                locationDiv.textContent = `Location: ${data.name}`;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', getLocation);
    </script>
</body>
</html>
