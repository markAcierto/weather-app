<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Weather</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.8s ease;
        }
        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            padding: 30px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            color: white;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        #weather-info {
            margin-top: 20px;
            display: none;
            opacity: 0;
            animation: fadeIn 0.6s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .weather-item {
            margin: 10px 0;
            font-size: 18px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .temperature {
            font-size: 64px;
            font-weight: bold;
            color: white;
            margin: 10px 0;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .description {
            text-transform: capitalize;
            margin: 10px 0;
            font-size: 22px;
            font-weight: 400;
        }
        .error {
            color: #ffcccc;
            margin-top: 20px;
            font-weight: bold;
        }
        .loading {
            color: white;
            font-style: italic;
            margin-bottom: 20px;
        }
        #location {
            font-weight: 500;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        #weather-icon {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }
        #feels-like {
            opacity: 0.9;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Weather</h1>
        <div id="location">Detecting location...</div>
        <div class="loading">Loading weather data...</div>
        <div id="weather-info">
            <img id="weather-icon" src="" alt="Weather Icon">
            <div class="temperature" id="temperature">--°C</div>
            <div class="description" id="description">--</div>
            <div class="weather-item">Humidity: <span id="humidity">--%</span></div>
            <div class="weather-item">Wind Speed: <span id="wind-speed">-- m/s</span></div>
            <div class="weather-item">Feels Like: <span id="feels-like">--°C</span></div>
        </div>
        <div id="error-message" class="error"></div>
    </div>

    <script>
        const API_KEY = '62b975314b57020b17b6dad18f91427e';
        const locationDiv = document.getElementById('location');
        const loadingDiv = document.querySelector('.loading');
        const weatherInfoDiv = document.getElementById('weather-info');
        const errorDiv = document.getElementById('error-message');
        const temperatureDiv = document.getElementById('temperature');
        const descriptionDiv = document.getElementById('description');
        const humidityDiv = document.getElementById('humidity');
        const windSpeedDiv = document.getElementById('wind-speed');
        const feelsLikeDiv = document.getElementById('feels-like');
        const weatherIcon = document.getElementById('weather-icon');

        const weatherBackgrounds = {
            'Clear': 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'Clouds': 'linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%)',
            'Rain': 'linear-gradient(135deg, #485563 0%, #29323c 100%)',
            'Drizzle': 'linear-gradient(135deg, #485563 0%, #29323c 100%)',
            'Thunderstorm': 'linear-gradient(135deg, #0f0c29 0%, #24243e 100%)',
            'Snow': 'linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%)',
            'Mist': 'linear-gradient(135deg, #757f9a 0%, #d7dde8 100%)',
            'Smoke': 'linear-gradient(135deg, #757f9a 0%, #d7dde8 100%)',
            'Haze': 'linear-gradient(135deg, #757f9a 0%, #d7dde8 100%)',
            'Dust': 'linear-gradient(135deg, #757f9a 0%, #d7dde8 100%)',
            'Fog': 'linear-gradient(135deg, #757f9a 0%, #d7dde8 100%)'
        };

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        locationDiv.textContent = `Location: Latitude ${lat.toFixed(4)}, Longitude ${lon.toFixed(4)}`;
                        fetchWeather(lat, lon);
                    },
                    error => {
                        errorDiv.textContent = `Error getting location: ${error.message}`;
                        loadingDiv.style.display = 'none';
                    }
                );
            } else {
                errorDiv.textContent = "Geolocation is not supported by this browser.";
                loadingDiv.style.display = 'none';
            }
        }

        async function fetchWeather(lat, lon) {
            try {
                const apiUrl = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&appid=${API_KEY}`;
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error(`Weather API error: ${response.status}`);
                }

                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                errorDiv.textContent = `Error fetching weather: ${error.message}`;
                loadingDiv.style.display = 'none';
            }
        }

        function displayWeather(data) {
            loadingDiv.style.display = 'none';
            weatherInfoDiv.style.display = 'block';

            temperatureDiv.textContent = `${Math.round(data.main.temp)}°C`;
            descriptionDiv.textContent = data.weather[0].description;
            humidityDiv.textContent = `${data.main.humidity}%`;
            windSpeedDiv.textContent = `${data.wind.speed} m/s`;
            feelsLikeDiv.textContent = `${Math.round(data.main.feels_like)}°C`;

            // Weather Icon
            weatherIcon.src = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;

            // Dynamic Background
            const mainCondition = data.weather[0].main;
            if (weatherBackgrounds[mainCondition]) {
                document.body.style.background = weatherBackgrounds[mainCondition];
            }

            if (data.name) {
                locationDiv.textContent = `Location: ${data.name}`;
            }
        }

        document.addEventListener('DOMContentLoaded', getLocation);
    </script>
</body>
</html>
